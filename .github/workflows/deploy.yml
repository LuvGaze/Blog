name: Deploy Astro Blog to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 4. pnpm缓存
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 5. 安装依赖并打包
      - name: Install and Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      # 6. 安装sshpass用于自动填SSH密码
      - name: Install sshpass
        run: sudo apt update && sudo apt install -y sshpass

      # 7. rsync增量同步
      - name: Rsync增量同步
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          PORT: ${{ secrets.SERVER_PORT }}
          PWD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          # -avz = 归档+详细输出+压缩，核心增量参数
          # --delete 删除远程本地不存在的旧文件
          # -e "ssh -p $PORT" 指定SSH端口
          # -o StrictHostKeyChecking=no 跳过主机密钥确认
          sshpass -p "$PWD" rsync -avzr --delete \
            --exclude='.git' --exclude='node_modules' \
            -e "ssh -p $PORT -o StrictHostKeyChecking=no" \
            ./dist/ root@$HOST:/www/wwwroot/Funny/