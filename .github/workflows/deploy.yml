name: Deploy Astro Blog to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 4. pnpm缓存
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 5. 安装依赖打包
      - name: Install and Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      # 加载私钥
      - name: Prepare SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 关闭Nginx，增加跳过主机密钥校验参数
      - name: Stop Nginx
        run: ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ secrets.SERVER_HOST }} "systemctl stop nginx"

      # 提前清空远端目录，避免--delete删旧文件报错
      - name: Clean Remote Folder
        run: ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ secrets.SERVER_HOST }} "rm -rf /www/wwwroot/Funny/*"

      # Rsync上传
      - name: Sync files via Rsync
        uses: burnett01/rsync-deployments@7.0.0
        with:
          switches: -vzr --inplace --progress --exclude='.git' --exclude='node_modules'
          path: ./dist/
          remote_path: /www/wwwroot/Funny/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: root
          remote_port: ${{ secrets.SERVER_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          legacy_allow_rsa_hostkeys: true

      # 重启Nginx
      - name: Start Nginx
        run: ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ secrets.SERVER_HOST }} "systemctl start nginx"