name: Deploy Astro Blog to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install and Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Prepare SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 1. 先停Nginx
      - name: Stop Nginx
        run: ssh -p ${{ secrets.SERVER_PORT }} root@${{ secrets.SERVER_HOST }} "systemctl stop nginx"

      # 2. 提前清空站点目录，无多余旧文件
      - name: Clean remote dir
        run: ssh -p ${{ secrets.SERVER_PORT }} root@${{ secrets.SERVER_HOST }} "rm -rf /www/wwwroot/Funny/*"

      - name: Sync files via Rsync
        uses: burnett01/rsync-deployments@7.0.0
        with:
          switches: -vzr --inplace --progress --exclude='.git' --exclude='node_modules'
          path: ./dist/
          remote_path: /www/wwwroot/Funny/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: root
          remote_port: ${{ secrets.SERVER_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          legacy_allow_rsa_hostkeys: true

      # 3. 重启Nginx
      - name: Start Nginx
        run: ssh -p ${{ secrets.SERVER_PORT }} root@${{ secrets.SERVER_HOST }} "systemctl start nginx"