# Astro博客自动化部署流水线
# 增量同步方案：服务器永久缓存Blog_Tmp，仅上传改动文件，日常更新速度大幅提升
name: Astro博客部署
# 触发条件：仅推送master分支代码时自动执行部署
on:
  push:
    branches:
      - master

jobs:
  deploy:
    # 运行环境：GitHub云端Ubuntu服务器
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库完整源码到运行容器
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 安装Node22环境，用于Astro项目打包
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. 安装pnpm包管理器，依赖安装速度优于npm/yarn
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 4. 获取pnpm缓存目录路径，用于复用依赖缓存，减少重复下载
      - name: Get pnpm store path
        id: pnpm_store
        shell: bash
        run: echo "PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      # 5. 缓存项目依赖，第二次及后续构建无需重新下载全部包
      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.PATH }}
          # 缓存唯一标识，lock文件变更自动更新缓存
          key: ${{ runner.os }}-pnpm-lock-${{ hashFiles('pnpm-lock.yaml') }}
          # 兜底缓存前缀，快速匹配历史缓存
          restore-keys: |
            ${{ runner.os }}-pnpm-lock-

      # 6. 安装依赖 + Astro打包dist
      - name: Install dependencies & Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      # 7. 增量同步dist到服务器永久缓存目录 /www/wwwroot/Blog_Tmp
      # Blog_Tmp长期留存，作为增量比对基准；--delete同步删除本地已移除资源
      - name: Incremental sync dist to Blog_Tmp
        uses: burnett01/rsync-deployments@7.0.0
        with:
          # 参数说明：
          # -vz 打印日志+传输时压缩文本文件；--delete 远端删除本地不存在的旧页面/图片
          # --size-only 仅对比文件大小判断是否变更，跳过哈希校验，提速
          # --compress-level=3 轻度压缩，降低加密CPU开销
          # --no-xxx 不同步权限、时间、属主元数据，减少比对耗时
          switches: -vz --stats --progress --delete --size-only --compress --compress-level=3 --no-times --no-perms --no-owner --no-group --exclude='.git' --exclude='node_modules'
          # 本地待同步目录：打包输出dist文件夹
          path: ./dist/
          # 远端永久缓存目录，与线上网站Funny同级，不会被rm误删新版文件
          remote_path: /www/wwwroot/Blog_Tmp/
          # 服务器连接私密信息，存放于仓库Secrets，不暴露明文
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: root
          remote_port: ${{ secrets.SERVER_PORT }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          legacy_allow_rsa_hostkeys: true

      # 8. 校验Blog_Tmp文件完整性，原子替换线上Funny目录
      # 仅同步成功才覆盖网站，同步失败直接退出，旧网站完全保留
      - name: Safe atomic replace online site
        run: |
          # 生成ssh密钥配置目录，写入私钥免密登录服务器
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          # ssh强制私钥权限600，否则拒绝登录
          chmod 600 ~/.ssh/id_rsa
          # 关闭主机密钥校验，避免首次连接交互阻塞流水线
          echo -e "Host *\nStrictHostKeyChecking no\nUserKnownHostsFile /dev/null" > ~/.ssh/config
          chmod 644 ~/.ssh/config
          # SSH远程执行服务器脚本
          ssh -p ${{ secrets.SERVER_PORT }} root@${{ secrets.SERVER_HOST }} "
            # 判断缓存目录存在有效文件
            if [ -n \"\$(ls -A /www/wwwroot/Blog_Tmp 2>/dev/null)\" ]; then
              # 清空线上网站目录Funny，Blog_Tmp同级不会被连带删除
              rm -rf /www/wwwroot/Funny/*
              # 将增量更新完成的新版全部移入线上目录
              mv /www/wwwroot/Blog_Tmp/* /www/wwwroot/Funny/
              echo \"部署完成，新版网站已生效\"
            else
              echo \"缓存目录无有效站点文件，终止替换，旧网站保持不变\"
              exit 1
            fi
          "