name: Firefly Blog
logo: public/favicon/favicon.ico

media:
  path: public/assets/images
  public_path: /assets/images

content:
  - name: settings
    label: 设置
    type: group
    items:
      - name: site-settings
        label: 站点设置
        type: file
        path: src/data/site.json
        format: json
        fields:
          - name: title
            label: 站点标题
            type: string
          - name: subtitle
            label: 站点副标题
            type: string
          - name: site_url
            label: 站点 URL
            type: string
          - name: description
            label: 站点描述
            type: text
          - name: themeColor
            label: 主题色
            type: object
            fields:
              - name: hue
                label: 色相
                type: number
                options:
                  min: 0
                  max: 360
              - name: defaultMode
                label: 默认模式
                type: select
                options:
                  - label: 亮色
                    value: light
                  - label: 暗色
                    value: dark
                  - label: 跟随系统
                    value: system
          - name: pages
            label: 页面开关
            type: object
            fields:
              - name: friends
                label: 友链页面
                type: boolean
              - name: sponsor
                label: 打赏页面
                type: boolean
              - name: guestbook
                label: 留言板
                type: boolean
              - name: bangumi
                label: 番组计划
                type: boolean
              - name: gallery
                label: 相册页面
                type: boolean
              - name: changelog
                label: 更新日志
                type: boolean
              - name: notebooks
                label: 笔记本
                type: boolean

      - name: comment-settings
        label: 评论设置
        type: file
        path: src/data/comments.json
        format: json
        fields:
          - name: type
            label: 评论系统
            type: select
            options:
              - label: 无
                value: none
              - label: Twikoo
                value: twikoo
              - label: Waline
                value: waline
              - label: Giscus
                value: giscus
          - name: twikoo
            label: Twikoo配置
            type: object
            fields:
              - name: envId
                label: 环境ID
                type: string
              - name: visitorCount
                label: 访问量统计
                type: boolean
          - name: waline
            label: Waline配置
            type: object
            fields:
              - name: serverURL
                label: 后端地址
                type: string
              - name: visitorCount
                label: 访问量统计
                type: boolean

      - name: music-settings
        label: 音乐设置
        type: file
        path: src/data/music.json
        format: json
        fields:
          - name: showInNavbar
            label: 导航栏显示
            type: boolean
          - name: mode
            label: 播放模式
            type: select
            options:
              - label: Meting API
                value: meting
              - label: 本地音乐
                value: local
          - name: volume
            label: 音量
            type: number
            options:
              min: 0
              max: 1

  - name: content
    label: 内容管理
    type: group
    items:
      - name: posts
        label: 博客文章
        type: collection
        path: src/content/posts
        format: yaml-frontmatter
        filename: "{primary}.md"
        subfolders: true
        exclude:
          - "**/*.avif"
          - "**/*.png"
          - "**/*.jpg"
          - "**/*.jpeg"
          - "**/*.webp"
          - "**/*.gif"
        view:
          primary: title
          sort: published
          order: desc
          fields:
            - title
            - published
            - category
            - draft
        fields:
          - name: title
            label: 标题
            type: string
            required: true
          - name: published
            label: 发布时间
            type: date
            required: true
          - name: updated
            label: 更新时间
            type: date
          - name: draft
            label: 草稿
            type: boolean
            default: false
          - name: description
            label: 描述
            type: text
          - name: image
            label: 封面图片
            type: image
          - name: tags
            label: 标签
            type: string
            list: true
          - name: category
            label: 分类
            type: string
          - name: pinned
            label: 置顶
            type: boolean
            default: false
          - name: comment
            label: 允许评论
            type: boolean
            default: true
          - name: password
            label: 密码
            type: string
          - name: body
            label: 正文
            type: rich-text

      - name: bangumi
        label: 番剧/影视/书籍/游戏
        type: collection
        path: src/content/bangumi
        format: yaml-frontmatter
        filename: "{primary}.md"
        subfolders: true
        view:
          primary: title
          sort: date
          order: desc
          fields:
            - title
            - category
            - status
            - score
        fields:
          - name: title
            label: 标题
            type: string
            required: true
          - name: name_cn
            label: 中文名称
            type: string
          - name: category
            label: 分类
            type: select
            default: anime
            options:
              - label: 书籍
                value: book
              - label: 动漫
                value: anime
              - label: 游戏
                value: game
              - label: 现实
                value: real
          - name: status
            label: 状态
            type: number
            default: 2
            options:
              min: 1
              max: 5
          - name: image
            label: 封面图片
            type: image
            required: true
          - name: link
            label: 链接
            type: string
          - name: score
            label: 评分
            type: number
            options:
              min: 0
              max: 10
          - name: comment
            label: 评论
            type: text
          - name: tags
            label: 标签
            type: string
            list: true
          - name: date
            label: 日期
            type: date
          - name: body
            label: 正文
            type: rich-text

      - name: changelog
        label: 更新日志
        type: collection
        path: src/content/changelog
        format: yaml-frontmatter
        filename: "{primary}.md"
        subfolders: false
        view:
          primary: version
          sort: date
          order: desc
          fields:
            - version
            - date
            - type
        fields:
          - name: version
            label: 版本号
            type: string
            required: true
          - name: date
            label: 日期
            type: date
            required: true
          - name: type
            label: 类型
            type: select
            required: true
            options:
              - label: 新功能
                value: feature
              - label: 改进
                value: improvement
              - label: 修复
                value: fix
              - label: 移除
                value: removal
          - name: description
            label: 描述
            type: text
            required: true

      - name: daohang
        label: 导航链接
        type: collection
        path: src/content/daohang
        format: yaml-frontmatter
        filename: "{primary}.md"
        subfolders: false
        view:
          primary: name
          sort: order
          order: asc
          fields:
            - name
            - category
            - featured
        fields:
          - name: name
            label: 名称
            type: string
            required: true
          - name: url
            label: URL
            type: string
            required: true
          - name: icon
            label: 图标
            type: string
          - name: description
            label: 描述
            type: text
          - name: category
            label: 分类
            type: string
            default: 未分类
          - name: featured
            label: 精选
            type: boolean
            default: false
          - name: order
            label: 排序
            type: number
            default: 0

      - name: routines
        label: 计划/日程
        type: collection
        path: src/content/plans
        format: yaml-frontmatter
        filename: "{primary}.md"
        subfolders: false
        view:
          primary: name
          sort: time
          order: asc
          fields:
            - name
            - time
            - icon
        fields:
          - name: name
            label: 名称
            type: string
            required: true
          - name: time
            label: 时间
            type: string
          - name: description
            label: 描述
            type: text
          - name: icon
            label: 图标
            type: string
            default: "📌"
          - name: body
            label: 正文
            type: rich-text

      - name: travel
        label: 旅行日记
        type: collection
        path: src/content/travel
        format: yaml-frontmatter
        filename: "{primary}.md"
        subfolders: false
        view:
          primary: title
          sort: date
          order: desc
          fields:
            - title
            - city
            - date
        fields:
          - name: title
            label: 标题
            type: string
            required: true
          - name: date
            label: 日期
            type: date
          - name: cover
            label: 封面图片
            type: image
          - name: province
            label: 省份
            type: string
          - name: city
            label: 城市
            type: string
          - name: experience
            label: 体验
            type: text
          - name: body
            label: 正文
            type: rich-text

      - name: notebooks
        label: 日记本
        type: collection
        path: src/content/notebooks
        format: yaml-frontmatter
        filename: "{primary}.md"
        subfolders: true
        view:
          primary: name
          sort: date
          order: desc
          fields:
            - name
            - date
        fields:
          - name: name
            label: 名称
            type: string
            default: 未命名日记本
          - name: cover
            label: 封面图片
            type: image
          - name: summary
            label: 摘要
            type: text
          - name: date
            label: 日期
            type: date
          - name: body
            label: 正文
            type: rich-text

      - name: spec
        label: 规格说明
        type: collection
        path: src/content/spec
        format: yaml-frontmatter
        filename: "{primary}.md"
        subfolders: false
        view:
          primary: title
          fields:
            - title
        fields:
          - name: title
            label: 标题
            type: string
          - name: body
            label: 正文
            type: rich-text
